  # csharp: the archive's README § Build runs `dotnet build`, § Test runs
  # `dotnet test` (no-op until a test project is emitted), and § End-to-end
  # boots bin/Debug/net10.0/roundhouse-app.dll under Playwright — all 6 specs,
  # including action_cable (live Turbo Streams over the /cable WebSocket).
  # Needs the .NET SDK + Node for Playwright; build-site bakes static/assets/
  # (turbo.min.js et al.) into the archive so Turbo and the cable boot.
  smoke-csharp:
    needs: build-site
    runs-on: ubuntu-latest
    steps:

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # -------------------------------------------------------------------
  # Generate the real-blog fixture once, upload as artifact. Every
  # downstream test job downloads + extracts it — pay the Ruby/Rails
  # install cost once per CI run instead of in each of seven jobs.
  # -------------------------------------------------------------------
  generate-fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
      - name: Install Rails
        run: gem install rails
      - name: Generate fixtures/real-blog
        run: make real-blog
      - name: Pack fixture
        run: |
          tar --exclude='./fixtures/real-blog/tmp' \
              --exclude='./fixtures/real-blog/log' \
              -czf real-blog.tar.gz fixtures/real-blog
      - name: Upload fixture
        uses: actions/upload-artifact@v4
        with:
          name: real-blog-fixture
          path: real-blog.tar.gz
          retention-days: 1

  # -------------------------------------------------------------------
  # Library correctness. Runs the default (non-ignored) test suite:
  # ingest / analyze / IR round-trip / per-target emit snapshot tests.
  # -------------------------------------------------------------------
  unit:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - name: cargo test
        run: cargo test --all-targets

  # -------------------------------------------------------------------
  # One job per target language. Each generates a project from the
  # fixtures in-process and runs the target's real toolchain over it.
  # -------------------------------------------------------------------
  toolchain-rust:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - name: cargo test --test rust_toolchain -- --ignored
        run: cargo test --test rust_toolchain -- --ignored --nocapture

  # toolchain-crystal: temporarily disabled while the Crystal target is
  # rebuilt from scratch using Spinel's emit-shape template + the
  # target-pluggable runtime_loader. The existing 6,604-LOC walker-style
  # emitter is being replaced with a ~2,800-LOC LibraryClass consumer
  # mirroring src/emit/ruby/. See memory:
  # project_crystal_rip_and_replace.md. Re-enable once the new emitter
  # passes locally.
  #
  # toolchain-crystal:
  #   needs: generate-fixture
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: dtolnay/rust-toolchain@stable
  #     - uses: Swatinem/rust-cache@v2
  #     - uses: actions/download-artifact@v4
  #       with:
  #         name: real-blog-fixture
  #     - name: Extract fixture
  #       run: tar -xzf real-blog.tar.gz
  #     - name: Install Crystal
  #       uses: crystal-lang/install-crystal@v1
  #       with:
  #         crystal: latest
  #     - name: cargo test --test crystal_toolchain -- --ignored
  #       run: cargo test --test crystal_toolchain -- --ignored --nocapture

  # toolchain-typescript: tsc parity + node:test on real-blog. The
  # filter `real_blog` excludes the still-aspirational tiny_blog
  # gate (broken on main, pre-existing) and the diagnostic
  # `dump_transpiled_blog_tsc_errors` non-asserting helper. Drop the
  # filter once tiny_blog reaches parity.
  toolchain-typescript:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: cargo test --test typescript_toolchain real_blog -- --ignored
        run: cargo test --test typescript_toolchain real_blog -- --ignored --nocapture

  framework-tests-typescript:
    # Per-target framework-test conformance gate. Transpiles
    # runtime/ruby/test/**/*_test.rb to TS and runs under tsx.
    # Independent of the real-blog fixture (each test builds a
    # minimal in-process App), so this parallelizes freely
    # against generate-fixture / toolchain-* jobs. Catches
    # per-target adapter contract drift (e.g., is_exists vs
    # exists rename, regex anchor translation) before it
    # cascades into real-blog runtime failures. Sibling of the
    # disabled toolchain-typescript above; runs on the same
    # Node setup but a much smaller and faster scope (~12s vs
    # minutes). See project_framework_test_transpile.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: cargo test --test framework_tests_typescript -- --ignored
        run: cargo test --test framework_tests_typescript -- --ignored --nocapture

  toolchain-go:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: cargo test --test go_toolchain -- --ignored
        run: cargo test --test go_toolchain -- --ignored --nocapture

  toolchain-elixir:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - name: Install Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '27'
      - name: cargo test --test elixir_toolchain -- --ignored
        run: cargo test --test elixir_toolchain -- --ignored --nocapture

  # -------------------------------------------------------------------
  # Spinel toolchain. Methodology asymmetry vs. the other toolchain
  # jobs: Spinel doesn't yet have its own test runner, so this job
  # emits the lowered app/ from real-blog plus the target-specific
  # tests from runtime/spinel/test/, then runs them over the emitted
  # output via CRuby (Spinel is a Ruby subset). Other toolchain jobs
  # emit both app + tests and run the emitted tests; the swap will
  # happen here once Spinel grows a runner.
  #
  # Second leg (rubocop_spinel) lints the same scratch tree the cargo
  # test produces — the shipped tree (scaffold + runtime + lowered
  # emit) — for spinel-subset compliance. CRuby silently accepts
  # patterns spinel rejects (eval, extend, module_function, bare
  # `send`, `class << self`, etc.); this is the static gate that
  # catches them. Interim while spinel itself isn't yet runnable as
  # a target.
  toolchain-spinel:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: ./runtime/spinel/scaffold
      - name: cargo test --test spinel_toolchain -- --ignored
        run: cargo test --test spinel_toolchain -- --ignored --nocapture
      - name: bundle exec rubocop (spinel-subset lint on emitted tree)
        # Scratch path matches `scratch_dir("real-blog")` in
        # tests/spinel_toolchain.rs (= `std::env::temp_dir()` joined,
        # which is `/tmp` on ubuntu-latest with no TMPDIR set).
        #
        # `continue-on-error: true` reinstated: emitted tree is
        # now subset-clean (verified locally), but CI's Bundler
        # 4.0.3 + rubocop 1.86.1 plugin loader tries to require
        # `standard-custom` (not in our Gemfile, not in our config).
        # Issue is environment-specific — locally, same Gemfile.lock
        # runs clean. Surfacing-only until the plugin-loader path
        # is understood / pinned.
        continue-on-error: true
        run: bundle exec rubocop --format github .
        working-directory: /tmp/roundhouse-spinel-real-blog
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/runtime/spinel/scaffold/Gemfile

  toolchain-python:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: cargo test --test python_toolchain -- --ignored
        run: cargo test --test python_toolchain -- --ignored --nocapture

  # -------------------------------------------------------------------
  # DOM equivalence: boot Rails + the target server side-by-side and
  # diff response bodies via tools/compare. The toolchain jobs above
  # only verify that the emitted code compiles and passes its native
  # tests; these jobs verify it actually behaves the same as Rails on
  # live HTTP. One job per target — same matrix as toolchain.
  # -------------------------------------------------------------------
  compare-rust:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: ./fixtures/real-blog
      - name: scripts/compare rust
        run: scripts/compare rust

  # compare-crystal: temporarily disabled — see toolchain-crystal above.
  #
  # compare-crystal:
  #   needs: generate-fixture
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: dtolnay/rust-toolchain@stable
  #     - uses: Swatinem/rust-cache@v2
  #     - uses: actions/download-artifact@v4
  #       with:
  #         name: real-blog-fixture
  #     - name: Extract fixture
  #       run: tar -xzf real-blog.tar.gz
  #     - uses: ruby/setup-ruby@v1
  #       with:
  #         ruby-version: '3.4'
  #         bundler-cache: true
  #         working-directory: ./fixtures/real-blog
  #     - name: Install Crystal
  #       uses: crystal-lang/install-crystal@v1
  #       with:
  #         crystal: latest
  #     - name: scripts/compare crystal
  #       run: scripts/compare crystal

  compare-typescript:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: ./fixtures/real-blog
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: scripts/compare typescript
        run: scripts/compare typescript

  compare-go:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: ./fixtures/real-blog
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: scripts/compare go
        run: scripts/compare go

  compare-elixir:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: ./fixtures/real-blog
      - name: Install Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '27'
      - name: scripts/compare elixir
        run: scripts/compare elixir

  compare-python:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: ./fixtures/real-blog
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: scripts/compare python
        run: scripts/compare python

  # compare-spinel: temporarily disabled. Backed by the CRuby
  # scaffold dev server (`server/dev_server.rb`), which has been
  # retired alongside the rubocop_spinel cleanup — its Thread/Mutex/
  # module_function usage is fundamentally outside the spinel
  # subset. Native HTTP is staged for civetweb in collaboration
  # with the spinel team once the backend lands. Re-enable once
  # the civetweb-backed dev server is in place. See memory:
  # project_ruby_dev_server_retirement.
  #
  # compare-spinel:
  #   needs: generate-fixture
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: dtolnay/rust-toolchain@stable
  #     - uses: Swatinem/rust-cache@v2
  #     - uses: actions/download-artifact@v4
  #       with:
  #         name: real-blog-fixture
  #     - name: Extract fixture
  #       run: tar -xzf real-blog.tar.gz
  #     - uses: ruby/setup-ruby@v1
  #       with:
  #         ruby-version: '3.4'
  #         bundler-cache: true
  #         working-directory: ./fixtures/real-blog
  #     - uses: ruby/setup-ruby@v1
  #       with:
  #         ruby-version: '3.4'
  #         bundler-cache: true
  #         working-directory: ./runtime/spinel/scaffold
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: '20'
  #     - name: scripts/compare spinel
  #       run: scripts/compare spinel

  # -------------------------------------------------------------------
  # Build the Pages site: per-target manifests (real-blog fixture) +
  # static HTML/CSS/JS from site/. Per matz/spinel#314, the archives at
  # rubys.github.io/roundhouse/browse/<target>.tgz are matz's primary
  # extraction surface for spinel-side bug repros — they need to
  # publish *current emit* even when per-target toolchain/compare jobs
  # fail (broken emit is exactly what's interesting to investigate).
  #
  # So build-site only gates on (a) the fixture being available, and
  # (b) the lib's own non-ignored test suite (a sanity check that the
  # build-site binary itself isn't catastrophically broken). It does
  # not gate on toolchain-* or compare-* — a flaky elixir CI run or a
  # known-broken target shouldn't stall the archive workflow.
  # -------------------------------------------------------------------
  build-site:
    needs:
      - generate-fixture
      - unit
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - name: cargo run --bin build-site
        run: cargo run --release --bin build-site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build-site
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

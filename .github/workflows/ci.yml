name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # -------------------------------------------------------------------
  # Generate the real-blog fixture once, upload as artifact. Every
  # downstream test job downloads + extracts it — pay the Ruby/Rails
  # install cost once per CI run instead of in each of seven jobs.
  # -------------------------------------------------------------------
  generate-fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
      - name: Install Rails
        run: gem install rails
      - name: Generate fixtures/real-blog
        run: make real-blog
      - name: Pack fixture
        run: |
          tar --exclude='./fixtures/real-blog/tmp' \
              --exclude='./fixtures/real-blog/log' \
              -czf real-blog.tar.gz fixtures/real-blog
      - name: Upload fixture
        uses: actions/upload-artifact@v4
        with:
          name: real-blog-fixture
          path: real-blog.tar.gz
          retention-days: 1

  # -------------------------------------------------------------------
  # Library correctness. Runs the default (non-ignored) test suite:
  # ingest / analyze / IR round-trip / per-target emit snapshot tests.
  # -------------------------------------------------------------------
  unit:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - name: cargo test
        run: cargo test --all-targets

  # -------------------------------------------------------------------
  # One job per target language. Each generates a project from the
  # fixtures in-process and runs the target's real toolchain over it.
  # -------------------------------------------------------------------
  toolchain-rust:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - name: cargo test --test rust_toolchain -- --ignored
        run: cargo test --test rust_toolchain -- --ignored --nocapture

  toolchain-crystal:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest
      - name: cargo test --test crystal_toolchain -- --ignored
        run: cargo test --test crystal_toolchain -- --ignored --nocapture

  toolchain-typescript:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: cargo test --test typescript_toolchain -- --ignored
        run: cargo test --test typescript_toolchain -- --ignored --nocapture

  toolchain-go:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: cargo test --test go_toolchain -- --ignored
        run: cargo test --test go_toolchain -- --ignored --nocapture

  toolchain-elixir:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - name: Install Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '27'
      - name: cargo test --test elixir_toolchain -- --ignored
        run: cargo test --test elixir_toolchain -- --ignored --nocapture

  # -------------------------------------------------------------------
  # Spinel toolchain. Methodology asymmetry vs. the other toolchain
  # jobs: Spinel doesn't yet have its own test runner, so this job
  # emits ONLY the lowered app/ from real-blog and runs spinel-blog's
  # hand-written tests (fixtures/spinel-blog/test/) over the emitted
  # output via CRuby (Spinel is a Ruby subset). Other toolchain jobs
  # emit both app + tests and run the emitted tests; the swap will
  # happen here once Spinel grows a runner. See
  # `project_spinel_test_asymmetry`.
  toolchain-spinel:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: ./fixtures/spinel-blog
      - name: cargo test --test spinel_toolchain -- --ignored
        run: cargo test --test spinel_toolchain -- --ignored --nocapture

  toolchain-python:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: cargo test --test python_toolchain -- --ignored
        run: cargo test --test python_toolchain -- --ignored --nocapture

  # -------------------------------------------------------------------
  # DOM equivalence: boot Rails + the target server side-by-side and
  # diff response bodies via tools/compare. The toolchain jobs above
  # only verify that the emitted code compiles and passes its native
  # tests; these jobs verify it actually behaves the same as Rails on
  # live HTTP. One job per target — same matrix as toolchain.
  # -------------------------------------------------------------------
  compare-rust:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: ./fixtures/real-blog
      - name: scripts/compare rust
        run: scripts/compare rust

  compare-crystal:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: ./fixtures/real-blog
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest
      - name: scripts/compare crystal
        run: scripts/compare crystal

  compare-typescript:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: ./fixtures/real-blog
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: scripts/compare typescript
        run: scripts/compare typescript

  compare-go:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: ./fixtures/real-blog
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: scripts/compare go
        run: scripts/compare go

  compare-elixir:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: ./fixtures/real-blog
      - name: Install Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '27'
      - name: scripts/compare elixir
        run: scripts/compare elixir

  compare-python:
    needs: generate-fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: ./fixtures/real-blog
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: scripts/compare python
        run: scripts/compare python

  # -------------------------------------------------------------------
  # Build the Pages site: per-target manifests (real-blog fixture) +
  # static HTML/CSS/JS from site/. Gated on every toolchain and
  # compare job so a broken target never publishes a misleading
  # manifest.
  # -------------------------------------------------------------------
  build-site:
    needs:
      - unit
      - toolchain-rust
      - toolchain-crystal
      - toolchain-typescript
      - toolchain-go
      - toolchain-elixir
      - toolchain-python
      - toolchain-spinel
      - compare-rust
      - compare-crystal
      - compare-typescript
      - compare-go
      - compare-elixir
      - compare-python
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: real-blog-fixture
      - name: Extract fixture
        run: tar -xzf real-blog.tar.gz
      - name: cargo run --bin build-site
        run: cargo run --release --bin build-site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build-site
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

          node-version: '20'
      - name: Install Playwright (chromium)
        run: |
          cd e2e
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium
      - name: scripts/e2e go
        run: scripts/e2e --tgz browse/go.tgz go

  # ruby (5/5): the archive is self-contained — its own Gemfile + Makefile
  # build Puma/Rack + tailwind (npx @tailwindcss/cli) + turbo.min.js (the
  # turbo-rails gem). Ruby IS the runtime here, so setup-ruby is expected
  # (unlike go). No skips — all five specs pass.
  e2e-ruby:
